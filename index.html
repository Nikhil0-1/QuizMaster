<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/sacq/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Smart Anti-Cheating Quiz System — Real-time hardware-integrated quiz platform for classrooms." />
    <title>QuizMaster Pro — Smart Anti-Cheating System</title>
    <script>
      // Auto-redirect to the offline version when opened directly
      if (window.location.protocol === 'file:' && !window.location.pathname.includes('/dist/')) {
        window.location.replace('./dist/index.html');
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #050508; color: #f8fafc; font-family: 'Inter', sans-serif; flex-direction: column;">
        <div style="width: 48px; height: 48px; border: 3px solid rgba(59,130,246,0.3); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <h2 style="font-weight: 600; font-size: 18px; margin-bottom: 8px;">QuizMaster Pro</h2>
        <p style="color: #64748b; font-size: 13px;">Initializing engines...</p>
        <p style="color: #ef4444; font-size: 11px; margin-top: 16px; opacity: 0; animation: fadein 0.5s ease 3s forwards;">
          If this takes too long, ensure you are running the app via <b>npm run dev</b>. <br/>
          To run the app directly offline, please open the built file at <b>dist/index.html</b>.
        </p>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadein { to { opacity: 1; } }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
